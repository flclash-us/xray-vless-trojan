version: '3.8'
services:
  clash:
    image: dreamacro/clash:latest
    container_name: clash
    restart: always
    ports:
      - "7890:7890"
      - "7891:7891"
      - "9090:9090"
    volumes:
      - ./config:/root/.config/clash
      - ./logs:/logs
    environment:
      - CLASH_SECRET=your-secret-password
    network_mode: host